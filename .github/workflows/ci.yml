name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Lua 5.4
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y lua5.4

      - name: Syntax check
        shell: bash
        run: |
          set -euo pipefail
          luac5.4 -p OneButtonPet.lua
          luac5.4 -p tests/run.lua

      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          lua5.4 tests/run.lua
