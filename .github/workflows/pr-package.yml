name: PR Addon Package

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: pr-package-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify release package contents
        shell: bash
        run: ./.github/scripts/verify-release-package.sh

      - name: Build addon package
        shell: bash
        run: |
          set -euo pipefail

          package_dir="dist/OneButtonPet"
          ./.github/scripts/stage-addon.sh "$package_dir"

      - name: Upload addon zip
        uses: actions/upload-artifact@v4
        with:
          name: OneButtonPet-pr-${{ github.event.pull_request.number }}
          path: dist/OneButtonPet
          if-no-files-found: error
          retention-days: 14
